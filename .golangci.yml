version: "2"

run:
  # Test files carry tier build tags (unit|integration|e2e); analyze all tiers so
  # tagged test files are not silently skipped by the linter.
  build-tags:
    - unit
    - integration
    - e2e

linters:
  # The standard set (errcheck, govet, ineffassign, staticcheck, unused). This
  # file is the single source of lint rules, read by CI (checks.lint), the dev
  # shortcut (nix run .#lint), and the staged pre-commit hook, so they agree.
  default: standard
  # This is a supply-chain / integrity tool. Enable stricter linters here as the
  # codebase grows, for example:
  # enable:
  #   - gosec
